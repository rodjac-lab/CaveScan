<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Céléstin — Architecture du Chatbot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f14;
    color: #e8e6e3;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 48px 24px 32px;
  }
  .header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #c49a6c, #e8c99b, #c49a6c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p {
    color: #8a8696;
    font-size: 0.95rem;
    font-weight: 300;
  }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    padding: 0 24px 32px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: #8a8696;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
  }

  /* Main SVG container */
  .diagram-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  svg {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 0 60px rgba(196, 154, 108, 0.05));
  }

  /* SVG Styles */
  .box {
    rx: 12;
    ry: 12;
    stroke-width: 1.5;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .box:hover {
    filter: brightness(1.15);
    stroke-width: 2.5;
  }

  /* Category colors */
  .cat-ui { fill: #1a1a2e; stroke: #6c63ff; }
  .cat-brain { fill: #1a1e2e; stroke: #4ecdc4; }
  .cat-memory { fill: #1e1a2e; stroke: #c49a6c; }
  .cat-llm { fill: #2e1a1e; stroke: #ff6b6b; }
  .cat-guard { fill: #1a2e1e; stroke: #a8e6cf; }
  .cat-data { fill: #2e2a1a; stroke: #ffd93d; }

  .box-title {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    fill: #ffffff;
  }
  .box-subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 10px;
    fill: #8a8696;
  }
  .box-detail {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 9.5px;
    fill: #a09cae;
  }
  .box-emoji {
    font-size: 18px;
  }
  .section-label {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Arrows */
  .arrow {
    stroke-width: 1.8;
    fill: none;
    opacity: 0.5;
    transition: opacity 0.3s;
  }
  .arrow:hover { opacity: 1; }
  .arrow-ui { stroke: #6c63ff; }
  .arrow-brain { stroke: #4ecdc4; }
  .arrow-memory { stroke: #c49a6c; }
  .arrow-llm { stroke: #ff6b6b; }
  .arrow-guard { stroke: #a8e6cf; }
  .arrow-data { stroke: #ffd93d; }

  /* Animated dashes for data flow */
  .flow-dash {
    stroke-dasharray: 6 4;
    animation: flowDash 1.5s linear infinite;
  }
  @keyframes flowDash {
    to { stroke-dashoffset: -20; }
  }

  /* Tooltip */
  .tooltip-group { opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .tooltip-group.visible { opacity: 1; }
  .tooltip-bg { fill: #1e1e2e; stroke: #3a3650; rx: 8; ry: 8; }
  .tooltip-text {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    fill: #c8c4d4;
  }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    top: 0;
    right: -480px;
    width: 460px;
    height: 100vh;
    background: #16161e;
    border-left: 1px solid #2a2840;
    padding: 32px 28px;
    transition: right 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    overflow-y: auto;
    z-index: 100;
  }
  .detail-panel.open { right: 0; }
  .detail-panel .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: 1px solid #3a3650;
    color: #8a8696;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .detail-panel .close-btn:hover { background: #2a2840; color: #fff; }
  .detail-panel h2 {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: #fff;
  }
  .detail-panel .tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .detail-panel p {
    font-size: 0.88rem;
    line-height: 1.7;
    color: #a09cae;
    margin-bottom: 14px;
  }
  .detail-panel .file-list {
    list-style: none;
    margin-top: 12px;
  }
  .detail-panel .file-list li {
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: #c49a6c;
    padding: 5px 0;
    border-bottom: 1px solid #1e1e2e;
  }
  .detail-panel h3 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #c8c4d4;
    margin-top: 20px;
    margin-bottom: 8px;
  }
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.visible { opacity: 1; pointer-events: all; }

  /* Responsive */
  @media (max-width: 768px) {
    .header h1 { font-size: 1.5rem; }
    .detail-panel { width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Céléstin — Architecture du Chatbot Sommelier</h1>
  <p>Schéma interactif — Cliquez sur un bloc pour voir les détails</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#6c63ff"></div>Interface (UI)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4"></div>Orchestration</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c49a6c"></div>Mémoire</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>LLM Providers</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a8e6cf"></div>Gardes-fous</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffd93d"></div>Données</div>
</div>

<div class="diagram-container">
<svg viewBox="0 0 1100 960" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-ui" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6c63ff" opacity="0.7"/>
    </marker>
    <marker id="arrow-brain" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ecdc4" opacity="0.7"/>
    </marker>
    <marker id="arrow-memory" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">

    </marker>
    <marker id="arrow-llm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">

    <marker id="arrow-guard" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a8e6cf" opacity="0.7"/>
    </marker>
    <marker id="arrow-data" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">

    <filter id="glow-memory"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c49a6c" flood-opacity="0.3"/></filter>
    <filter id="glow-llm"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ff6b6b" flood-opacity="0.3"/></filter>
    <filter id="glow-guard"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a8e6cf" flood-opacity="0.3"/></filter>
    <filter id="glow-data"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffd93d" flood-opacity="0.3"/></filter>

  <!-- ==================== SECTION LABELS ==================== -->
  <text x="30" y="30" class="section-label" fill="#6c63ff" opacity="0.6">Frontend</text>

  <!-- ==================== ROW 1: FRONTEND ==================== -->

  <!-- Hooks -->

  <!-- ==================== DIVIDER ==================== -->
  <line x1="40" y1="170" x2="1060" y2="170" stroke="#2a2840" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="500" y="185" font-family="Inter" font-size="9" fill="#3a3650" text-anchor="middle">— POST /celestin —</text>

  <!-- ==================== ROW 2: ORCHESTRATION — PIPELINE SÉQUENTIEL ==================== -->

function showDetail(id) {
  const d = details[id];
  if (!d) return;
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  let html = `<h2>${d.title}</h2>`;
  html += `<span class="tag" style="background:${d.tagColor}22; color:${d.tagColor}; border: 1px solid ${d.tagColor}44">${d.tag}</span>`;
  html += `<p>${d.description}</p>`;

  for (const s of (d.sections || [])) {
    html += `<h3>${s.title}</h3>`;
    if (s.content) {
      html += `<p style="white-space:pre-line; font-size:0.82rem;">${s.content}</p>`;
    }
    if (s.files) {
      html += '<ul class="file-list">';
      for (const f of s.files) {
        html += `<li>${f}</li>`;
      }
      html += '</ul>';
    }
  }

  content.innerHTML = html;
  panel.classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
});
</script>
