<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — Gros medaillon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 40px;
    background: #2a2522;
    display: flex;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1350px;
    background: #171513;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .brand {
    position: absolute;
    top: 44px;
    left: 64px;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(184, 134, 11, 0.7);
    z-index: 2;
  }

  .wine-header {
    padding: 100px 64px 32px;
  }

  .wine-name {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: #F7F4EF;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .wine-details {
    font-size: 20px;
    color: #A09A93;
    letter-spacing: 0.5px;
  }

  .wine-details .cuvee {
    color: #D4A843;
    font-style: italic;
  }

  .photo-section {
    position: relative;
    margin: 0 64px;
    height: 440px;
  }

  .photo-main {
    width: 100%;
    height: 100%;
    background: #1e1b19;
    border-radius: 14px;
    overflow: hidden;
  }

  .photo-main img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .photo-main::after {
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 300px;
    height: 100%;
    background: linear-gradient(to left, rgba(23, 21, 19, 0.3), transparent);
    border-radius: 0 14px 14px 0;
    pointer-events: none;
  }

  .photo-medallion {
    position: absolute;
    bottom: -40px;
    right: -10px;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: 4px solid #B8860B;
    overflow: hidden;
    z-index: 1;
    box-shadow: -8px 8px 32px rgba(0,0,0,0.5);
  }

  .photo-medallion img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .stars-row {
    padding: 64px 64px 0;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stars {
    display: flex;
    gap: 6px;
  }

  .star {
    width: 28px;
    height: 28px;
    color: #B8860B;
  }

  .star.empty {
    color: #3a3530;
  }

  .verdict {
    font-size: 15px;
    font-weight: 600;
    color: #B8860B;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .tasting-quote {
    flex: 1;
    padding: 28px 64px 0;
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 400;
    font-style: italic;
    color: #F7F4EF;
    line-height: 1.5;
    position: relative;
  }

  .tasting-quote::before {
    content: '\201C';
    font-size: 100px;
    color: #B8860B;
    opacity: 0.25;
    position: absolute;
    top: -10px;
    left: 40px;
    font-family: 'Playfair Display', serif;
    line-height: 1;
  }

  .card-footer {
    padding: 24px 64px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-url {
    font-size: 18px;
    color: #B8860B;
    letter-spacing: 1px;
  }

  .footer-tagline {
    font-size: 14px;
    color: #6B6560;
    margin-top: 2px;
  }

  .footer-date {
    font-size: 15px;
    color: #6B6560;
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">Celestin</div>

  <div class="wine-header">
    <div class="wine-name">Chateau des Tours</div>
    <div class="wine-details"><span class="cuvee">Reserve</span> &middot; Cotes-du-Rhone 2017 &middot; Blanc</div>
  </div>

  <div class="photo-section">
    <div class="photo-main">
      <img src="../Photo tests API/PXL_20251225_124257633.jpg" alt="Etiquette">
    </div>
    <div class="photo-medallion">
      <img src="../Photo tests API/PXL_20251224_183321903.jpg" alt="Plat">
    </div>
  </div>

  <div class="stars-row">
    <div class="stars">
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>
    <div class="verdict">Pepite</div>
  </div>

  <div class="tasting-quote">
    Incroyable complexite pour un Cotes-du-Rhone. Nez de fruits blancs, cire d'abeille et une pointe d'epices. Bouche ample et tendue a la fois. Raynaud est un genie.
  </div>

  <div class="card-footer">
    <div>
      <div class="footer-url">mycelestin.com</div>
      <div class="footer-tagline">Ton sommelier IA personnel</div>
    </div>
    <div class="footer-date">Decembre 2025</div>
  </div>
</div>

</body>
</html>
