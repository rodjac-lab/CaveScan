<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Partage — Souvenir</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 40px;
    background: #2a2522;
    display: flex;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1350px;
    background: #171513;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Large photo with gradient overlay */
  .photo-hero {
    width: 100%;
    height: 600px;
    background: #1e1b19;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-hero .placeholder {
    color: #4a4540;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .photo-hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(transparent, #171513);
  }

  /* Brand overlay on photo */
  .brand-overlay {
    position: absolute;
    top: 40px;
    left: 48px;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(184, 134, 11, 0.8);
    z-index: 1;
  }

  /* Content */
  .content {
    flex: 1;
    padding: 20px 64px 48px;
    display: flex;
    flex-direction: column;
  }

  /* Date badge */
  .date-badge {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: #A09A93;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* Quote — the tasting note is the hero */
  .tasting-quote {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 400;
    font-style: italic;
    color: #F7F4EF;
    line-height: 1.45;
    margin-bottom: 48px;
    position: relative;
  }

  .tasting-quote::before {
    content: '\201C';
    font-size: 120px;
    color: #B8860B;
    opacity: 0.3;
    position: absolute;
    top: -50px;
    left: -10px;
    font-family: 'Playfair Display', serif;
    line-height: 1;
  }

  /* Wine identity — secondary */
  .wine-identity {
    margin-top: auto;
    padding-top: 40px;
    border-top: 1px solid rgba(184, 134, 11, 0.2);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .wine-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .wine-name {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: #F7F4EF;
    line-height: 1.1;
  }

  .wine-details {
    font-size: 20px;
    color: #A09A93;
  }

  /* Stars — compact, on the right */
  .stars-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  .stars {
    display: flex;
    gap: 4px;
  }

  .star {
    width: 28px;
    height: 28px;
    color: #B8860B;
  }

  .star.empty {
    color: #3a3530;
  }

  .verdict {
    font-size: 16px;
    font-weight: 600;
    color: #B8860B;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Footer */
  .card-footer {
    padding: 32px 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .footer-url {
    font-size: 18px;
    color: #B8860B;
    letter-spacing: 1px;
  }

  .footer-tagline {
    font-size: 14px;
    color: #6B6560;
  }
</style>
</head>
<body>

<div class="card">
  <div class="photo-hero">
    <div class="brand-overlay">Celestin</div>
    <span class="placeholder">Photo de l'etiquette ou du moment</span>
  </div>

  <div class="content">
    <div class="date-badge">Mars 2026</div>

    <div class="tasting-quote">
      Nez de violette et de poivre noir. Bouche soyeuse avec une belle tension, finale longue sur les epices. Superbe avec l'agneau de ce soir.
    </div>

    <div class="wine-identity">
      <div class="wine-info">
        <div class="wine-name">Domaine Faury</div>
        <div class="wine-details">Saint-Joseph 2021 &middot; La Berne &middot; Rouge</div>
      </div>
      <div class="stars-block">
        <div class="stars">
          <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="star empty" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <div class="verdict">Pepite</div>
      </div>
    </div>
  </div>

  <div class="card-footer">
    <div>
      <div class="footer-url">mycelestin.com</div>
      <div class="footer-tagline">Ton sommelier IA personnel</div>
    </div>
  </div>
</div>

</body>
</html>
