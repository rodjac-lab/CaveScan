<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Partage — Bold</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 40px;
    background: #2a2522;
    display: flex;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1350px;
    background: #171513;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Strong wine-color accent strip */
  .accent-strip {
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 12px;
    background: #722F37;
  }

  .accent-strip.blanc { background: #C8B560; }
  .accent-strip.rose { background: #D4917A; }
  .accent-strip.bulles { background: #DAC17C; }

  /* Header */
  .header {
    padding: 56px 64px 0 76px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #B8860B;
  }

  .date {
    font-size: 16px;
    color: #6B6560;
  }

  /* Main content */
  .main {
    flex: 1;
    padding: 48px 64px 0 76px;
    display: flex;
    gap: 48px;
  }

  /* Left column — photo */
  .photo-col {
    width: 380px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .photo-frame {
    width: 380px;
    height: 520px;
    background: #1e1b19;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .photo-frame .placeholder {
    color: #4a4540;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Star rating under photo */
  .rating-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stars {
    display: flex;
    gap: 4px;
  }

  .star {
    width: 36px;
    height: 36px;
    color: #B8860B;
  }

  .star.empty {
    color: #3a3530;
  }

  .rating-text {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 700;
    color: #B8860B;
  }

  /* Right column — info */
  .info-col {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .wine-color-label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #722F37;
    margin-bottom: 16px;
  }

  .wine-color-label.blanc { color: #C8B560; }
  .wine-color-label.rose { color: #D4917A; }
  .wine-color-label.bulles { color: #DAC17C; }

  .wine-name {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: #F7F4EF;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .wine-cuvee {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    font-style: italic;
    color: #D4A843;
    margin-bottom: 8px;
  }

  .wine-appellation {
    font-size: 22px;
    color: #A09A93;
    margin-bottom: 40px;
  }

  /* Tasting note */
  .tasting-note {
    font-size: 22px;
    font-weight: 300;
    color: #ccc5bc;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  /* Badges */
  .badges {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: auto;
  }

  .badge {
    padding: 10px 24px;
    border-radius: 100px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge-pepite {
    background: rgba(184, 134, 11, 0.15);
    color: #D4A843;
    border: 1px solid rgba(184, 134, 11, 0.3);
  }

  .badge-rebuy {
    background: rgba(76, 175, 80, 0.12);
    color: #81C784;
    border: 1px solid rgba(76, 175, 80, 0.25);
  }

  .badge-color {
    border: 1px solid rgba(114, 47, 55, 0.4);
    color: #722F37;
    background: rgba(114, 47, 55, 0.1);
  }

  /* Footer */
  .card-footer {
    padding: 32px 64px 48px 76px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .footer-url {
    font-size: 20px;
    color: #B8860B;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .footer-tagline {
    font-size: 14px;
    color: #6B6560;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="accent-strip"></div>

  <div class="header">
    <div class="brand">Celestin</div>
    <div class="date">Mars 2026</div>
  </div>

  <div class="main">
    <div class="photo-col">
      <div class="photo-frame">
        <span class="placeholder">Photo etiquette</span>
      </div>
      <div class="rating-row">
        <div class="stars">
          <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="star empty" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <div class="rating-text">4/5</div>
      </div>
    </div>

    <div class="info-col">
      <div class="wine-color-label">Rouge</div>
      <div class="wine-name">Domaine Faury</div>
      <div class="wine-cuvee">La Berne</div>
      <div class="wine-appellation">Saint-Joseph 2021</div>

      <div class="tasting-note">
        Nez de violette et de poivre noir. Bouche soyeuse avec une belle tension, finale longue sur les epices. Superbe avec l'agneau de ce soir.
      </div>

      <div class="badges">
        <span class="badge badge-pepite">Pepite</span>
        <span class="badge badge-rebuy">A racheter</span>
      </div>
    </div>
  </div>

  <div class="card-footer">
    <div>
      <div class="footer-url">mycelestin.com</div>
      <div class="footer-tagline">Ton sommelier IA personnel</div>
    </div>
  </div>
</div>

</body>
</html>
